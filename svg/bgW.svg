<svg width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 不再使用纯白，而是使用带有体积感的冷峻水泥灰/太空银 -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#E2E4E9"/>
      <stop offset="50%" stop-color="#C5C8D0"/>
      <stop offset="100%" stop-color="#A5A9B4"/>
    </radialGradient>

    <!-- 浓郁的云雾暗斑 (类似石材纹理、磨损痕迹) -->
    <filter id="smudge-dark" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.002" numOctaves="5" seed="1"/>
      <feColorMatrix type="saturate" values="0"/>
      <!-- 极高对比度，产生明显的斑驳黑影 -->
      <feComponentTransfer>
        <feFuncR type="linear" slope="2" intercept="-0.5"/>
        <feFuncG type="linear" slope="2" intercept="-0.5"/>
        <feFuncB type="linear" slope="2" intercept="-0.5"/>
      </feComponentTransfer>
    </filter>

    <!-- 亮部斑驳 (制造云朵或高光起伏，像大理石白纹) -->
    <filter id="smudge-light" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.004" numOctaves="4" seed="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.5" intercept="-0.2"/>
        <feFuncG type="linear" slope="1.5" intercept="-0.2"/>
        <feFuncB type="linear" slope="1.5" intercept="-0.2"/>
      </feComponentTransfer>
    </filter>

    <!-- 明显的划痕/纤维纹理 -->
    <filter id="scratch" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.8" numOctaves="3" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- 强烈的噪点颗粒，提供真实的物理质感 -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="4"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- 1. 基础底色 (不再是纯白) -->
  <rect width="100%" height="100%" fill="url(#vignette)"/>

  <!-- 2. 暗部斑驳 (因为底色变灰了，这里可以大胆压暗，创造深邃的阴影和旧石材质感) -->
  <rect width="100%" height="100%" filter="url(#smudge-dark)" style="mix-blend-mode: multiply; opacity: 0.25; pointer-events:none"/>
  
  <!-- 3. 亮部斑驳 (底色是灰色，screen滤色会让白色的云雾极其明显地浮现出来) -->
  <rect width="100%" height="100%" filter="url(#smudge-light)" style="mix-blend-mode: screen; opacity: 0.45; pointer-events:none"/>

  <!-- 4. 斜向划痕 (旋转放大以避免边缘裁剪) -->
  <g style="transform-origin: center; transform: rotate(15deg) scale(1.5);">
    <rect x="-50%" y="-50%" width="200%" height="200%" filter="url(#scratch)" style="mix-blend-mode: multiply; opacity: 0.12; pointer-events:none"/>
  </g>
  <g style="transform-origin: center; transform: rotate(-25deg) scale(1.5);">
    <rect x="-50%" y="-50%" width="200%" height="200%" filter="url(#scratch)" style="mix-blend-mode: screen; opacity: 0.18; pointer-events:none"/>
  </g>

  <!-- 5. 高频噪点覆盖层，打碎色块断层，同时赋予物理触感 -->
  <rect width="100%" height="100%" filter="url(#grain)" style="mix-blend-mode: normal; opacity: 0.08; pointer-events:none"/>
</svg>
