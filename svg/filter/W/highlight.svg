<svg xmlns="http://www.w3.org/2000/svg">
  <filter id="hl" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="n"/>
    <feDisplacementMap in="SourceAlpha" in2="n" scale="8" result="w"/>
    <feGaussianBlur in="w" stdDeviation="3" result="b"/>
    <feSpecularLighting in="b" surfaceScale="2.5" specularConstant="0.9" specularExponent="25" lighting-color="white" result="s">
      <feDistantLight azimuth="225" elevation="45"/>
    </feSpecularLighting>
    <feComposite in="s" in2="SourceAlpha" operator="in" result="ms"/>
    <feBlend in="ms" in2="SourceGraphic" mode="overlay"/>
  </filter>
</svg>
