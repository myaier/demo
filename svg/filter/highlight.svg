<svg xmlns="http://www.w3.org/2000/svg">
  <filter id="hl" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="n"/>
    <feDisplacementMap in="SourceAlpha" in2="n" scale="6" result="w"/>
    <feGaussianBlur in="w" stdDeviation="2.5" result="b"/>
    <feSpecularLighting in="b" surfaceScale="3.5" specularConstant="1.2" specularExponent="40" lighting-color="white" result="s">
      <feDistantLight azimuth="225" elevation="40"/>
    </feSpecularLighting>
    <feComposite in="s" in2="SourceAlpha" operator="in" result="ms"/>
    <feBlend in="ms" in2="SourceGraphic" mode="screen"/>
  </filter>
</svg>
