<svg width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 暗色黑板渐变 (Vignette 晕影效果) -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="50%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- 大范围云雾脏迹，形成斑驳感 -->
    <filter id="smudge-dark" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.002" numOctaves="5" seed="1"/>
      <feColorMatrix type="saturate" values="0"/>
      <!-- 增加对比度 -->
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.5" intercept="-0.2"/>
        <feFuncG type="linear" slope="1.5" intercept="-0.2"/>
        <feFuncB type="linear" slope="1.5" intercept="-0.2"/>
      </feComponentTransfer>
    </filter>

    <filter id="smudge-light" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="4" seed="2"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- 拉伸的噪声，用来模拟微弱的划痕 -->
    <filter id="scratch" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.8" numOctaves="3" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- 防断层与细密噪点 (Anti-banding) -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="4"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- 1. 基础底色 -->
  <rect width="100%" height="100%" fill="url(#vignette)"/>

  <!-- 2. 暗部斑驳 (正片叠底加深) -->
  <rect width="100%" height="100%" filter="url(#smudge-dark)" style="mix-blend-mode: multiply; opacity: 0.65; pointer-events:none"/>
  
  <!-- 3. 亮部斑驳/灰尘 (滤色提亮) -->
  <rect width="100%" height="100%" filter="url(#smudge-light)" style="mix-blend-mode: screen; opacity: 0.08; pointer-events:none"/>

  <!-- 4. 斜向划痕 (旋转放大以避免边缘裁剪) -->
  <g style="transform-origin: center; transform: rotate(15deg) scale(1.5);">
    <rect x="-50%" y="-50%" width="200%" height="200%" filter="url(#scratch)" style="mix-blend-mode: overlay; opacity: 0.15; pointer-events:none"/>
  </g>
  <g style="transform-origin: center; transform: rotate(-25deg) scale(1.5);">
    <rect x="-50%" y="-50%" width="200%" height="200%" filter="url(#scratch)" style="mix-blend-mode: multiply; opacity: 0.1; pointer-events:none"/>
  </g>

  <!-- 5. 高频噪点覆盖层，打碎色块断层 -->
  <rect width="100%" height="100%" filter="url(#grain)" style="mix-blend-mode: normal; opacity: 0.06; pointer-events:none"/>
</svg>
