<svg xmlns="http://www.w3.org/2000/svg">
  <filter id="hl" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="n"/>
    <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blurA"/>
    <feDisplacementMap in="blurA" in2="n" scale="4" result="w"/>
    <feGaussianBlur in="w" stdDeviation="1.2" result="b"/>
    <feSpecularLighting in="b" surfaceScale="2" specularConstant="1.2" specularExponent="70" lighting-color="white" result="s">
      <feDistantLight azimuth="225" elevation="45"/>
    </feSpecularLighting>
    <feComposite in="s" in2="SourceAlpha" operator="in" result="ms"/>
    <feGaussianBlur in="ms" stdDeviation="0.5" result="ms_soft"/>
    <feComposite in="ms_soft" in2="SourceAlpha" operator="in" result="ms_final"/>
    <feBlend in="ms_final" in2="SourceGraphic" mode="overlay"/>
  </filter>
</svg>
