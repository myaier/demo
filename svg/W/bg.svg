<svg width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Base Gradient (Light Grey to Deeper Silver Grey) -->
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDEDED"/>
      <stop offset="100%" stop-color="#D6D6D6"/>
    </linearGradient>

    <!-- Top Frost Curve Gradient (Screenshot color to Light Grey) -->
    <linearGradient id="topFrost" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4F4F4"/>
      <stop offset="100%" stop-color="#EDEDED"/>
    </linearGradient>

    <!-- Center Glow (Mimicking the light pool in the reference) -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Massive Blur for the volumetric frosted edge -->
    <filter id="megaBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>

    <!-- Paper Texture 1: The Pulp (Cloudy, uneven fibers of real paper) -->
    <filter id="pulp">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Paper Texture 2: The Surface Grain (Tactile roughness) -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- 1. Deep Ice Blue Background -->
  <rect width="100%" height="100%" fill="url(#bgBase)"/>

  <!-- 2. The Volumetric Top Frost Curve (A soft horizon line) -->
  <!-- Dips gently in the middle, incredibly blurred for volumetric lighting -->
  <path d="M -200 450 Q 960 750 2120 450 L 2120 -200 L -200 -200 Z" fill="url(#topFrost)" filter="url(#megaBlur)"/>

  <!-- 3. Central Highlights to mimic the soft light pool -->
  <ellipse cx="960" cy="540" rx="800" ry="500" fill="url(#centerGlow)" opacity="0.6"/>

  <!-- 4. The Premium Paper Textures Overlay -->
  <!-- Layer 1: The 'Pulp' (creates slight cloudy unevenness mimicking paper fibers) -->
  <rect width="100%" height="100%" filter="url(#pulp)" opacity="0.04" style="mix-blend-mode: multiply; pointer-events: none;"/>
  <!-- Layer 2: The 'Grain' (creates the fine tactile surface roughness) -->
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.06" style="mix-blend-mode: multiply; pointer-events: none;"/>
</svg>
