<svg width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAEBEF"/>
      <stop offset="100%" stop-color="#F5F5F7"/>
    </linearGradient>

    <!-- Soft White Gradients for Waves -->
    <linearGradient id="waveLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.5"/>
    </linearGradient>
    
    <linearGradient id="waveDim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EBEBF0" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="waveBright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Extremely soft drop shadow to create physical depth without harsh lines -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="48" flood-color="#000000" flood-opacity="0.03"/>
    </filter>

    <filter id="softShadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.02"/>
    </filter>

    <!-- Noise for premium physical texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Wave Layers -->
  <g>
    <!-- BACK LAYER: The large swooping highlight, acting as the thick "halo" -->
    <path d="M -100,850 C 300,850 350,150 850,150 C 1450,150 1600,400 2000,400 L 2000,1200 L -100,1200 Z" fill="#FFFFFF" opacity="0.4" filter="url(#softShadow)"/>

    <!-- MID LAYER: The main swooping wave -->
    <path d="M -100,900 C 250,900 350,220 850,220 C 1400,220 1600,450 2000,450 L 2000,1200 L -100,1200 Z" fill="url(#waveLight)" filter="url(#softShadow)"/>

    <!-- FRONT LAYER BOTTOM RIGHT: The halo -->
    <path d="M 900,1200 C 1200,800 1500,650 2000,800 L 2000,1200 Z" fill="#FFFFFF" opacity="0.5" filter="url(#softShadowLight)"/>
    <!-- FRONT LAYER BOTTOM RIGHT: Main wave -->
    <path d="M 1000,1200 C 1250,850 1550,700 2000,850 L 2000,1200 Z" fill="url(#waveBright)" filter="url(#softShadowLight)"/>

    <!-- FRONT LAYER BOTTOM LEFT: The subtle ground curve -->
    <path d="M -100,1200 L -100,1050 C 150,1050 300,1080 500,1200 Z" fill="url(#waveDim)" opacity="0.9" filter="url(#softShadowLight)"/>
  </g>

  <!-- Multiply Noise -->
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.04" style="mix-blend-mode: multiply; pointer-events: none;"/>
</svg>
