<svg width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Blue -->
    <linearGradient id="bgBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A284A"/>
      <stop offset="100%" stop-color="#145EAA"/>
    </linearGradient>

    <!-- Light Blue Wave -->
    <linearGradient id="waveBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#145EAA"/>
      <stop offset="100%" stop-color="#1A73C9"/>
    </linearGradient>

    <!-- Main Sexy Red to Yellow Flow -->
    <linearGradient id="waveRedYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CA215B"/>
      <stop offset="30%" stop-color="#E94334"/>
      <stop offset="60%" stop-color="#FDB231"/>
      <stop offset="100%" stop-color="#F25B22"/>
    </linearGradient>

    <!-- Mid Brown/Orange Flow -->
    <linearGradient id="waveBrown" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A51D44"/>
      <stop offset="50%" stop-color="#D14028"/>
      <stop offset="100%" stop-color="#D97228"/>
    </linearGradient>

    <!-- Bottom Deep Purple Flow -->
    <linearGradient id="wavePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#55215A"/>
      <stop offset="50%" stop-color="#712F6C"/>
      <stop offset="100%" stop-color="#3A1E52"/>
    </linearGradient>

    <!-- Realistic Drop Shadows -->
    <filter id="shadowHeavy" x="-10%" y="-10%" width="120%" height="150%">
      <feDropShadow dx="0" dy="25" stdDeviation="25" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadowSoft" x="-10%" y="-10%" width="120%" height="150%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Path Definitions for reuse -->
    <path id="pathBlue" d="M-100,200 C300,200 500,500 1000,400 S1600,150 2100,300 L2100,1200 L-100,1200 Z"/>
    <path id="pathMain" d="M-100,350 C200,350 250,650 450,550 S700,350 800,400 S1000,750 1150,600 S1450,400 1600,450 S1900,650 2100,500 L2100,1200 L-100,1200 Z"/>
    <path id="pathBrown" d="M-100,600 C300,600 500,800 800,700 S1200,550 1400,700 S1800,900 2100,750 L2100,1200 L-100,1200 Z"/>
    <path id="pathPurple" d="M-100,850 C400,850 600,750 1000,850 S1600,1050 2100,900 L2100,1200 L-100,1200 Z"/>
  </defs>

  <!-- 1. Deep Blue Background -->
  <rect width="100%" height="100%" fill="url(#bgBlue)"/>

  <!-- 2. Light Blue Background Wave -->
  <use href="#pathBlue" fill="url(#waveBlue)" filter="url(#shadowSoft)"/>
  <use href="#pathBlue" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.15"/>

  <!-- 3. The Main Sexy Red-Yellow Wave -->
  <use href="#pathMain" fill="url(#waveRedYellow)" filter="url(#shadowHeavy)"/>
  <use href="#pathMain" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>

  <!-- 4. Lower Orange/Red Wave -->
  <use href="#pathBrown" fill="url(#waveBrown)" filter="url(#shadowSoft)"/>
  <use href="#pathBrown" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.15"/>

  <!-- 5. Bottom Deep Purple Base -->
  <use href="#pathPurple" fill="url(#wavePurple)" filter="url(#shadowHeavy)"/>
  <use href="#pathPurple" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.15"/>
</svg>
